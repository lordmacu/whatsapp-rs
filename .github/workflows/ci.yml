name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  # Weekly run catches regressions from nightly toolchain changes even
  # when the code hasn't moved.
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # `RUSTFLAGS: "-D warnings"` is intentionally not set while the project
  # has a dead-code backlog from in-progress modules. Promoted later.

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  # `cargo fmt --check` intentionally omitted: the codebase has hand-tuned
  # formatting in many places; a blanket `cargo fmt` is planned but hasn't
  # been run yet. Uncomment when ready.
  #
  # fmt:
  #   name: rustfmt
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #       with: { components: rustfmt }
  #     - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Don't hard-fail on every warning yet — the project has a backlog of
      # dead-code hints from in-progress modules. Still catch real lints.
      - run: cargo clippy --all-targets --all-features -- -D clippy::correctness -A warnings

  # ── Tests on stable + beta ──────────────────────────────────────────────────
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --verbose
      - run: cargo test --lib --verbose

  # ── MSRV gate (from Cargo.toml rust-version) ────────────────────────────────
  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib --all-features

  # ── `cargo publish` dry-run — catches missing metadata before release ─────
  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo package --allow-dirty

  # ── docs.rs build preview — fails early if rustdoc can't render ────────────
  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build only — don't fail on doc warnings until they're cleaned up.
      # Promoted to `-D warnings` later.
      - run: cargo doc --no-deps --lib
